<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nagaland State Lottery - Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffb300; 
            --bg-dark: #0a0f18;
            --card-glass: rgba(255, 255, 255, 0.08);
            --emerald: #2e7d32;
        }
        body { margin: 0; background: var(--bg-dark); font-family: 'Poppins', sans-serif; color: white; overflow: hidden; height: 100vh; }
        
        /* Top Bar with Profile Icon */
        .top-bar { 
            padding: 15px 20px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .logo { font-weight: 800; font-size: 14px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
        .profile-btn { width: 35px; height: 35px; background: var(--card-glass); border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Admin ID Card Overlay */
        #admin-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .admin-id-card {
            width: 280px; background: linear-gradient(145deg, #1a1a1a, #000); padding: 25px;
            border-radius: 20px; border: 2px solid var(--gold); text-align: center; position: relative;
        }
        .admin-photo { width: 80px; height: 80px; background: #333; border-radius: 50%; margin: 0 auto 15px; border: 2px solid var(--gold); overflow: hidden; }
        .admin-photo img { width: 100%; height: 100%; object-fit: cover; }

        /* Existing Styles */
        #auth-badge { position: fixed; top: 85px; right: -300px; background: linear-gradient(135deg, #2e7d32, #4ade80); color: white; padding: 12px 25px; border-radius: 50px 0 0 50px; font-size: 12px; font-weight: 800; transition: 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; display: flex; align-items: center; gap: 8px; }
        #auth-badge.slide-in { transform: translateX(-300px); }
        .container { position: relative; width: 100%; height: calc(100vh - 80px); display: flex; justify-content: center; align-items: flex-start; padding-top: 30px; }
        .card { position: absolute; width: 90%; max-width: 380px; background: var(--card-glass); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: 0.5s ease; box-sizing: border-box; }
        .hidden { transform: translateX(-150%) scale(0.8); opacity: 0; pointer-events: none; }
        .hidden-right { transform: translateX(150%) scale(0.8); opacity: 0; pointer-events: none; }
        .active-view { transform: translateX(0) scale(1); opacity: 1; pointer-events: all; }
        .input-group { margin-bottom: 12px; text-align: left; }
        label { font-size: 9px; color: #94a3b8; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .animated-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        .glow-box { animation: borderPulse 2s infinite; font-size: 22px; text-align: center; border-width: 2px; letter-spacing: 4px; }
        @keyframes borderPulse { 0%, 100% { border-color: rgba(255, 179, 0, 0.2); } 50% { border-color: var(--gold); } }
        .btn-main { width: 100%; background: linear-gradient(135deg, #ffb300, #ff8f00); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .qr-code { width: 160px; height: 160px; background: white; padding: 8px; border-radius: 10px; margin: 10px auto; border: 3px solid var(--gold); display: block; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 0; font-size: 12px; }
        .info-label { color: #94a3b8; }
    </style>
</head>
<body>

    <div id="admin-overlay" onclick="closeAdmin()">
        <div class="admin-id-card" onclick="event.stopPropagation()">
            <div class="admin-photo">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin">
            </div>
            <h3 style="margin: 0; color: var(--gold);">ADMIN OFFICIAL</h3>
            <p style="font-size: 11px; color: #4ade80; margin: 5px 0;">ID: NSL-ADMIN-2026</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <p style="font-size: 12px; color: #ccc;">Designation: Head of Operations</p>
            <p style="font-size: 12px; color: #ccc;">Server Status: <span style="color: #4ade80;">Online</span></p>
            <button class="btn-main" style="padding: 10px; font-size: 10px;" onclick="closeAdmin()">Close</button>
        </div>
    </div>

    <div id="auth-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        AUTHENTICATION VERIFIED
    </div>

    <div class="top-bar">
        <div class="logo">NAGALAND STATE LOTTERY</div>
        <div class="profile-btn" onclick="openAdmin()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#ffb300"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </div>

    <div class="container">
        <div class="card active-view" id="step1">
            <h2 style="text-align: center; margin: 0 0 10px;">Ticket Check</h2>
            <div class="input-group">
                <label>Ticket Number</label>
                <input type="number" id="ticket-id" class="animated-input glow-box" placeholder="00000" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5)">
            </div>
            <button class="btn-main" onclick="toDetails()">Verify Now</button>
            <div id="loader" style="display:none; text-align:center; margin-top:15px; font-size: 11px;">AUTHENTICATING...</div>
        </div>

        <div class="card hidden-right" id="step2">
            <h2 style="text-align: center; margin: 10px 0;">Registration</h2>
            <div class="input-group"><label>First Name</label><input type="text" id="fname" class="animated-input"></div>
            <div class="input-group"><label>Last Name</label><input type="text" id="lname" class="animated-input"></div>
            <div class="input-group"><label>Mobile Number</label><input type="number" id="mobile" class="animated-input"></div>
            <button class="btn-main" onclick="toPayment()">Confirm</button>
        </div>

        <div class="card hidden-right" id="step3">
            <h2 style="text-align: center; margin: 0;">Payment</h2>
            <img src="https://i.postimg.cc/FH2Jb2P9/Account-QRCode-Jio-Payments-Bank-8183-DARK-THEME-1.jpg" class="qr-code">
            <p style="font-size: 11px; text-align: center; color: #94a3b8;">Pay and click Submit Below</p>
            <button class="btn-main" style="background: var(--emerald); color: white;" onclick="showFinalReceipt()">Submit Payment</button>
        </div>

        <div class="card hidden-right" id="step4">
            <h2 style="text-align: center; margin: 0; color: #4ade80;">Success</h2>
            <div style="margin: 15px 0;">
                <div class="info-row"><span class="info-label">Name:</span><span id="res-name">---</span></div>
                <div class="info-row"><span class="info-label">Ticket:</span><span id="res-ticket">---</span></div>
                <div class="info-row"><span class="info-label">Transaction:</span><span id="res-trans">---</span></div>
                <div class="info-row"><span class="info-label">Confirm ID:</span><span id="res-id" style="color:var(--gold)">---</span></div>
                <div class="info-row"><span class="info-label">Date:</span><span id="res-date">---</span></div>
            </div>
            <button class="btn-main" onclick="location.reload()">New Entry</button>
        </div>
    </div>

    <script>
        let ticketNum = "";
        function openAdmin() { document.getElementById('admin-overlay').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }

        function toDetails() {
            ticketNum = document.getElementById('ticket-id').value;
            if(ticketNum.length < 5) return alert("Enter 5-digit ticket");
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('auth-badge').classList.add('slide-in');
                setTimeout(() => document.getElementById('auth-badge').classList.remove('slide-in'), 3000);
                document.getElementById('step1').className = "card hidden";
                document.getElementById('step2').className = "card active-view";
            }, 1500);
        }

        function toPayment() {
            if(!document.getElementById('fname').value || !document.getElementById('mobile').value) return alert("Fill details");
            document.getElementById('step2').className = "card hidden";
            document.getElementById('step3').className = "card active-view";
        }

        function showFinalReceipt() {
            const now = new Date();
            const dateStr = now.toLocaleDateString() + " | " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            document.getElementById('res-name').innerText = document.getElementById('fname').value + " " + document.getElementById('lname').value;
            document.getElementById('res-ticket').innerText = "#" + ticketNum;
            document.getElementById('res-trans').innerText = "TXN" + Math.floor(Math.random()*9000000);
            document.getElementById('res-id').innerText = "ID-" + Math.floor(Math.random()*8999+1000);
            document.getElementById('res-date').innerText = dateStr;

            document.getElementById('step3').className = "card hidden";
            document.getElementById('step4').className = "card active-view";
        }
    </script>
</body>
</html>
