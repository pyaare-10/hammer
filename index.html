<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>91 CLUB - Pro</title>
    <style>
        :root { --red: #d91e1e; --grey: #f4f4f4; }
        body { margin: 0; font-family: Arial; background: var(--grey); padding-bottom: 70px; }
        
        /* Header */
        .header { background: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px #ddd; }
        .logo { color: var(--red); font-weight: bold; font-size: 20px; }
        
        /* WinGo Section */
        .wingo-card { background: white; margin: 10px; border-radius: 15px; padding: 15px; text-align: center; border-top: 4px solid var(--red); }
        .timer-box { display: flex; justify-content: space-around; align-items: center; background: #fff5f5; padding: 10px; border-radius: 10px; }
        .timer { font-size: 24px; font-weight: bold; color: var(--red); }
        
        /* Betting Buttons */
        .bet-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn { border: none; padding: 12px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .green { background: #28a745; } .violet { background: #6f42c1; } .red-btn { background: #dc3545; }
        
        .big-small { display: flex; gap: 10px; margin-top: 10px; }
        .bs-btn { flex: 1; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .big { background: #ffc107; color: black; }
        .small { background: #17a2b8; color: white; }

        /* Number Grid */
        .numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .num { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 50%; font-weight: bold; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { font-size: 12px; color: #666; text-align: center; cursor: pointer; }
        .active { color: var(--red); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">91 CLUB</div>
        <div>🇮🇳 EN</div>
    </div>

    <div style="background: var(--red); height: 120px; margin: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
        WELCOME BONUS 100%
    </div>

    <div class="wingo-card">
        <div class="timer-box">
            <div>WinGo 1Min<br><small>Period: 2024032301</small></div>
            <div class="timer" id="timer">00:45</div>
        </div>

        <div class="bet-buttons">
            <button class="btn green" onclick="bet('Green')">Green</button>
            <button class="btn violet" onclick="bet('Violet')">Violet</button>
            <button class="btn red-btn" onclick="bet('Red')">Red</button>
        </div>

        <div class="numbers">
            <div class="num" style="color:red">0</div><div class="num" style="color:green">1</div>
            <div class="num" style="color:red">2</div><div class="num" style="color:green">3</div>
            <div class="num" style="color:red">4</div><div class="num" style="color:green">5</div>
            <div class="num" style="color:red">6</div><div class="num" style="color:green">7</div>
            <div class="num" style="color:red">8</div><div class="num" style="color:green">9</div>
        </div>

        <div class="big-small">
            <button class="bs-btn big" onclick="bet('Big')">BIG</button>
            <button class="bs-btn small" onclick="bet('Small')">SMALL</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active">🏠<br>Home</div>
        <div class="nav-item">📊<br>Activity</div>
        <div class="nav-item" style="background:var(--red); color:white; width:40px; height:40px; border-radius:50%; line-height:40px;">💎</div>
        <div class="nav-item">💰<br>Wallet</div>
        <div class="nav-item">👤<br>Account</div>
    </div>

    <script>
        // Real-time Timer Logic
        let time = 60;
        setInterval(() => {
            time--;
            if(time < 0) time = 60;
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            document.getElementById('timer').innerHTML = 
                `0${mins}:${secs < 10 ? '0'+secs : secs}`;
        }, 1000);

        function bet(type) {
            alert("Aapne " + type + " par bet lagayi hai!");
        }
    </script>
</body>
</html>
