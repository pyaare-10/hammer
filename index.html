<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDORE 91 - Pro Gaming</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Arial', sans-serif;
            background-color: #1a1a1a; color: white; overflow-x: hidden;
        }

        /* Header */
        header {
            background: #2d2d2d; padding: 15px; text-align: center;
            border-bottom: 2px solid #ffcc00; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; color: #ffcc00; text-transform: uppercase; }

        /* Banner */
        .banner {
            width: 95%; height: 150px; background: linear-gradient(45deg, #333, #000);
            margin: 15px auto; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; border: 1px solid #444;
        }

        /* Grid */
        .container {
            padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }
        .card {
            background: #2d2d2d; border-radius: 10px; padding: 20px;
            text-align: center; border: 1px solid #3d3d3d; cursor: pointer;
        }
        .card:active { transform: scale(0.95); }

        /* Login Button */
        .btn-main {
            background: #ffcc00; color: black; border: none; padding: 15px;
            border-radius: 30px; font-weight: bold; width: 90%;
            margin: 20px auto; display: block; text-align: center; cursor: pointer;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #222;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #444; z-index: 100;
        }
        .nav-item { font-size: 12px; color: #888; text-decoration: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: #ffcc00; }

        /* LOGIN POPUP (MODAL) */
        .login-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #2d2d2d; border-radius: 25px 25px 0 0;
            transition: 0.5s; z-index: 1000; padding: 20px; box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .login-modal.active { bottom: 0; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 999;
        }
        .modal-overlay.show { display: block; }
        
        input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #444; color: white;
            border-radius: 8px; box-sizing: border-box;
        }
        .close-btn { float: right; font-size: 20px; color: #ffcc00; cursor: pointer; }
    </style>
</head>
<body>

    <header><div class="logo">INDORE 91</div></header>

    <div class="banner"><h2>WIN BIG TODAY!</h2></div>

    <div class="container">
        <div class="card" onclick="alert('Game Loading...')">🎰<br>Casino</div>
        <div class="card" onclick="alert('Sports Betting...')">⚽<br>Sports</div>
        <div class="card" onclick="alert('Coming Soon...')">🃏<br>Rummy</div>
        <div class="card" onclick="alert('Slots Loading...')">🎡<br>Slots</div>
    </div>

    <button class="btn-main" id="openLogin">LOGIN / REGISTER</button>

    <div class="modal-overlay" id="overlay"></div>

    <div class="login-modal" id="loginPopup">
        <span class="close-btn" id="closeLogin">✖</span>
        <h2 style="color: #ffcc00;">Login</h2>
        <input type="text" placeholder="Phone Number / Username">
        <input type="password" placeholder="Password">
        <button class="btn-main" onclick="alert('Logging in...')">CONFIRM LOGIN</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="changeActive(this)">🏠<br>Home</div>
        <div class="nav-item" onclick="changeActive(this)">📊<br>Activity</div>
        <div class="nav-item" onclick="changeActive(this)">💰<br>Wallet</div>
        <div class="nav-item" onclick="changeActive(this)">👤<br>Account</div>
    </div>

    <script>
        const openBtn = document.getElementById('openLogin');
        const closeBtn = document.getElementById('closeLogin');
        const popup = document.getElementById('loginPopup');
        const overlay = document.getElementById('overlay');

        // Open Login
        openBtn.addEventListener('click', () => {
            popup.classList.add('active');
            overlay.classList.add('show');
        });

        // Close Login
        closeBtn.addEventListener('click', () => {
            popup.classList.remove('active');
            overlay.classList.remove('show');
        });

        overlay.addEventListener('click', () => {
            popup.classList.remove('active');
            overlay.classList.remove('show');
        });

        // Bottom Nav Active Switch
        function changeActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
