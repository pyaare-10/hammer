<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Royal Winner | Casino & Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="config.js"></script>

    <style>
        :root { 
            --gold: #fbc02d; 
            --bg-dark: #0a0f18;
            --card-glass: rgba(255, 255, 255, 0.08);
            --emerald: #2e7d32;
        }
        body { margin: 0; background: var(--bg-dark); font-family: 'Poppins', sans-serif; color: white; overflow-x: hidden; height: 100vh; }
        
        /* Layout Control */
        .page { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; padding-top: 80px; box-sizing: border-box; }
        .active-view { display: block; }

        /* Top Bar */
        .top-bar { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); box-sizing: border-box;
        }
        .logo { font-weight: 800; font-size: 16px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-family: 'Rajdhani'; }

        /* Cards */
        .container { display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .card { 
            width: 100%; max-width: 380px; background: var(--card-glass); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; 
            padding: 30px 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); box-sizing: border-box; 
        }

        /* Inputs */
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 6px; text-transform: uppercase; }
        .animated-input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px; border-radius: 12px; color: white; font-size: 16px; outline: none; box-sizing: border-box;
        }

        /* Buttons */
        .btn-main { 
            width: 100%; background: linear-gradient(135deg, #fbc02d, #f57f17); 
            color: #000; border: none; padding: 18px; border-radius: 15px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }

        /* Special Items */
        .qr-code { width: 180px; height: 180px; background: white; padding: 10px; border-radius: 12px; margin: 15px auto; border: 4px solid var(--gold); display: block; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; font-size: 13px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo" id="header-title">ROYAL WINNER</div>
        <div style="font-size: 10px; color: #4ade80;">● SECURE SERVER</div>
    </div>

    <div id="step1" class="page active-view">
        <div class="container">
            <div class="card">
                <h2 style="text-align: center; margin: 0 0 5px;">Registration</h2>
                <p style="color: #64748b; font-size: 12px; text-align: center; margin-bottom: 25px;">Enter Customer Details</p>
                <div class="input-group"><label>First Name</label><input type="text" id="fname" class="animated-input" placeholder="First Name"></div>
                <div class="input-group"><label>Last Name</label><input type="text" id="lname" class="animated-input" placeholder="Last Name"></div>
                <div class="input-group"><label>Mobile Number</label><input type="number" id="mobile" class="animated-input" placeholder="10 Digit Number"></div>
                <button class="btn-main" onclick="toPayment()">Continue</button>
            </div>
        </div>
    </div>

    <div id="step2" class="page">
        <div class="container">
            <div class="card">
                <h2 style="text-align: center; margin: 0;">Deposit</h2>
                <div style="text-align: center;">
                    <img id="qr-display" src="" class="qr-code">
                    <p id="payment-note" style="font-size: 11px; color: #94a3b8; line-height: 1.4;"></p>
                </div>
                <button class="btn-main" style="background: var(--emerald); color: white;" onclick="showReceipt()">Submit Payment</button>
            </div>
        </div>
    </div>

    <div id="step3" class="page">
        <div class="container">
            <div class="card">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="background: var(--emerald); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                    </div>
                    <h2 style="margin: 0;">Success</h2>
                    <p style="font-size: 12px; color: #4ade80;">Payment Request Submitted</p>
                </div>
                <div class="info-row"><span style="color:#888">Name:</span><span id="res-name"></span></div>
                <div class="info-row"><span style="color:#888">Transaction:</span><span id="res-trans"></span></div>
                <div class="info-row"><span style="color:#888">Confirm ID:</span><span id="res-id" style="color:var(--gold)"></span></div>
                <div class="info-row"><span style="color:#888">Date:</span><span id="res-date"></span></div>
                
                <button class="btn-main" onclick="location.reload()">Done</button>
            </div>
        </div>
    </div>

    <script>
        // Load Data from Central Brain (config.js)
        window.onload = function() {
            if(typeof CONFIG !== 'undefined') {
                document.getElementById('header-title').innerText = CONFIG.siteName;
                document.getElementById('qr-display').src = CONFIG.qrLink;
                document.getElementById('payment-note').innerText = "Min Deposit: ₹" + CONFIG.minDeposit + "\n" + (CONFIG.paymentNote || "Scan and pay for instant credits");
            }
        };

        function toPayment() {
            const fn = document.getElementById('fname').value;
            const mb = document.getElementById('mobile').value;
            if(!fn || mb.length < 10) return alert("Please fill valid details");
            
            document.getElementById('step1').classList.remove('active-view');
            document.getElementById('step2').classList.add('active-view');
        }

        function showReceipt() {
            const now = new Date();
            const fullName = document.getElementById('fname').value + " " + document.getElementById('lname').value;
            
            document.getElementById('res-name').innerText = fullName;
            document.getElementById('res-trans').innerText = "TXN" + Math.floor(Math.random() * 90000000);
            document.getElementById('res-id').innerText = "ID-" + Math.floor(Math.random() * 89999 + 10000);
            document.getElementById('res-date').innerText = now.toLocaleString();

            document.getElementById('step2').classList.remove('active-view');
            document.getElementById('step3').classList.add('active-view');
        }
    </script>
</body>
</html>
